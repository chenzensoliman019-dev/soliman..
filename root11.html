<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <link rel="stylesheet" href="./global.css" />
  <link rel="stylesheet" href="./shared-nav.css" />
  <link rel="stylesheet" href="./root11.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Agdasima:wght@700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil+Display:wght@800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caesar+Dressing:wght@400&display=swap" />
</head>
<body>
<div class="page-wrapper">
  <nav class="navbar">
    <div class="nav-title" onclick="window.location.href='./'">Avong Nen Romy</div>
    <div class="nav-center">
      <div class="social-icons">
        <img class="social-icon" alt="Facebook" src="./public/Facebook2@2x.png" />
        <img class="social-icon" alt="Google Plus" src="./public/Google-Plus2@2x.png" />
        <img class="social-icon" alt="Instagram" src="./public/Instagram2@2x.png" />
        <img class="social-icon" alt="LinkedIn" src="./public/LinkedIn2@2x.png" />
      </div>
      <div class="search-bar">
        <input class="search-input" placeholder="search" type="text" />
        <img class="search-icon" alt="search" src="./public/Search-Icon.svg" />
      </div>
    </div>
    <button class="profile-btn" onclick="window.location.href='./page.html'">
      <img src="./public/Profile@2x.png" alt="profile" />
    </button>
  </nav>

  <div class="hero">
    <img class="hero-bg" src="./public/image-2@2x.png" alt="" />
    <div class="about-us-pill" onclick="window.open('https://www.facebook.com/AvongRomy')">ABOUT US</div>

    <div class="profile-panel">
      <h1 class="profile-title">profile</h1>
      <div class="profile-card">
        <div class="avatar-area">
          <div class="avatar-circle">
            <img src="./public/User.svg" alt="user" class="avatar-icon" />
            <img src="./public/Ellipse-1.svg" alt="" class="avatar-ring" />
          </div>
          <div class="member-badge">solid member</div>
        </div>
        <div class="profile-details">
          <div class="profile-field"><span class="field-label">name:</span></div>
          <div class="profile-field"><span class="field-label">email:</span></div>
          <div class="profile-field"><span class="field-label">contact number:</span></div>
          <div class="profile-field"><span class="field-label">emergency contact:</span></div>
        </div>
      </div>

      <div class="social-links">
        <img src="./public/FacebookLogo.svg" alt="Facebook" class="social-link-icon" />
        <img src="./public/InstagramLogo.svg" alt="Instagram" class="social-link-icon" />
        <img src="./public/GoodreadsLogo.svg" alt="Goodreads" class="social-link-icon" />
      </div>

      <button class="logout-btn" onclick="window.location.href='./'">log out</button>
    </div>

    <button class="house-btn" onclick="window.location.href='./homepage1.html'">
      <img src="./public/House.svg" alt="home" />
    </button>
  </div>
</div>
</body>
</html>
