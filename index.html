<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <link rel="stylesheet" href="./global.css" />
  <link rel="stylesheet" href="./shared-nav.css" />
  <link rel="stylesheet" href="./index.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Agdasima:wght@700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil+Display:wght@800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caesar+Dressing:wght@400&display=swap" />
</head>
<body>
<div class="page-wrapper">
  <nav class="navbar">
    <div class="nav-title" onclick="window.location.href='./'">Avong Nen Romy</div>
    <div class="nav-center">
      <div class="social-icons">
        <img class="social-icon" alt="Facebook" src="./public/Facebook@2x.png" />
        <img class="social-icon" alt="Google Plus" src="./public/Google-Plus@2x.png" />
        <img class="social-icon" alt="Instagram" src="./public/Instagram@2x.png" />
        <img class="social-icon" alt="LinkedIn" src="./public/LinkedIn1@2x.png" />
      </div>
      <div class="search-bar">
        <input class="search-input" placeholder="search" type="text" />
        <img class="search-icon" alt="search" src="./public/Search-Icon.svg" />
      </div>
    </div>
    <button class="sign-in-btn">SIGN IN</button>
  </nav>

  <div class="hero">
    <img class="hero-bg" src="./public/image-2@2x.png" alt="" />
    <div class="about-us-pill" onclick="window.open('https://www.facebook.com/AvongRomy')">ABOUT US</div>

    <div class="hero-content">
      <div class="left-panel">
        <div class="join-us-label">JOIN US</div>
        <div class="signup-box" id="signupBox">
          <h3 class="signup-title">Sign up and join us</h3>
          <hr class="signup-divider" />
          <div class="field-row">
            <div class="input-wrap"><input class="field-input" placeholder="first name" type="text" /></div>
            <div class="input-wrap"><input class="field-input" placeholder="last name" type="text" /></div>
          </div>
          <div class="input-wrap full"><input class="field-input" placeholder="email" type="email" /></div>
          <div class="input-wrap full"><input class="field-input" placeholder="password" type="password" /></div>
          <div class="input-wrap full"><input class="field-input" placeholder="confirm password" type="password" /></div>
          <div class="terms-row">
            <input type="checkbox" class="terms-check" />
            <span class="terms-text">I accept the term of use<br />and privacy policy</span>
          </div>
          <button class="signup-btn" onclick="window.location.href='./homepage1.html'">SIGN UP</button>
        </div>
      </div>
      <div class="tagline">ONE TARGET.<br />MANY WAYS TO<br />HIT.</div>
    </div>
  </div>
</div>
</body>
</html>
